<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f7f8fa;
      font-family: "Microsoft YaHei", sans-serif;
    }
    .title {
      font-size: 32px;
      margin-bottom: 40px;
      color: #333;
    }
    .btn {
      padding: 14px 32px;
      background: #409eff;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #337ecc;
    }
  </style>
</head>
<body>
  <h1 class="title">欢迎来到我的个人主页</h1>
  <a href="resume.html" class="btn">查看我的简历</a>
</body>
</html>
